name: Daily Brief

# Permanent cloud schedule for the daily market-psychology brief.
# Runs on GitHub-hosted runners (free — repo is public), so it no longer
# depends on the founder's Mac being awake. Mirrors scripts/refresh_and_deploy.sh.
#
# Target: land in the inbox BY 07:30 KST on KR trading mornings (Mon–Fri).
# Scheduled at 21:50 UTC == 06:50 KST because (a) GitHub cron fires late —
# often 10–30 min at busy :00/:30 slots — and (b) the build itself takes
# minutes; 06:50 absorbs both. US session is closed by 05:00 KST, so pulling
# earlier loses no data. Weekend sends are OFF (weekday-only habit: a Sat/Sun
# brief with no KR session ahead trains readers to ignore the mail; Friday's
# US close is covered by Monday's brief via the '마감 기준' header).
# UTC↔KST day shift: KST Mon–Fri 06:50 == UTC Sun–Thu 21:50 → days 0-4.
# The job runs in Asia/Seoul time so datetime.now() produces the KST date.

on:
  schedule:
    - cron: "50 21 * * 0-4"   # 06:50 KST Mon–Fri (UTC Sun–Thu)
  workflow_dispatch: {}       # manual "Run workflow" button

permissions:
  contents: write             # push the daily data commit back to main

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          EDGAR_USER_AGENT=${{ secrets.EDGAR_USER_AGENT }}
          DART_API_KEY=${{ secrets.DART_API_KEY }}
          FRED_API_KEY=${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }}
          BRIEF_TO=${{ secrets.BRIEF_TO }}
          BRIEF_FROM=${{ secrets.BRIEF_FROM }}
          GMAIL_USER=${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          KIS_APP_KEY=${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }}
          KIS_USE_REAL=${{ secrets.KIS_USE_REAL }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      - name: Build site
        run: python scripts/build_site.py

      - name: JS sanity gate (never ship an unparseable page)
        run: |
          python - <<'PY'
          import re, pathlib
          h = pathlib.Path("docs/pack.html").read_text(encoding="utf-8")
          m = re.search(r"<script>(.*)</script>", h, re.S)
          pathlib.Path("/tmp/pb_check.js").write_text(m.group(1))
          PY
          node --check /tmp/pb_check.js

      - name: Morning brief (email + web)
        run: python scripts/brief.py --send --web --quiet || echo "brief step failed (non-fatal)"

      - name: Settings page + home inject
        run: |
          python scripts/build_settings_page.py || echo "settings page failed (non-fatal)"
          python scripts/inject_home.py || echo "home inject failed (non-fatal)"

      # Pushing docs/ to main auto-triggers the GitHub Pages build
      # (Pages source = main /docs), which is the live site
      # https://seanbae-analyst.github.io/pivox-brief/ . No deploy token needed.
      - name: Commit daily data back to main (-> GitHub Pages auto-deploy)
        run: |
          git config user.name "pivox-brief-bot"
          git config user.email "bot@pivoxquant.com"
          if [ -n "$(git status --porcelain docs/pack.html docs/brief.html docs/settings.html)" ]; then
            git add docs/pack.html docs/brief.html docs/settings.html
            git commit -m "chore(refresh): daily data + brief ($(date +%F))"
            git push
            echo "pushed -> main (Pages will rebuild)"
          else
            echo "no data change"
          fi
